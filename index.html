<body>

<header class="topbar">
  <div class="brand" onclick="goHome()">TU-GET <span>PBT Practice</span></div>
  <button class="nav-toggle" onclick="toggleNav()" aria-label="เปิด/ปิดเมนู"><i class="ti ti-menu-2"></i></button>
  <nav id="mainNav">
    <button onclick="goHome()">หน้าหลัก</button>
    <button onclick="openTagPractice()">ฝึกแยกหัวข้อ</button>
    <button onclick="openVocabList()">คลังคำศัพท์</button>
    <button onclick="openBookmarks()">บุ๊กมาร์ก</button>
    <button onclick="openStats()">สถิติ</button>
    <button onclick="openWrongBank()">สมุดข้อผิด</button>
    <span class="fs-control" title="ปรับขนาดฟอนต์">
      <button onclick="changeFont(-1)" aria-label="ลดขนาดฟอนต์">A−</button>
      <button onclick="changeFont(1)" aria-label="เพิ่มขนาดฟอนต์">A+</button>
    </span>
    <button id="themeToggle" onclick="toggleTheme()" title="สลับโหมดมืด/สว่าง">🌙</button>
  </nav>
</header>

<main id="app"></main>

<footer>
  เว็บฝึกฝนแนวข้อสอบเพื่อการศึกษา — โจทย์ทั้งหมดแต่งขึ้นใหม่ ไม่ใช่ข้อสอบจริง

</footer>
