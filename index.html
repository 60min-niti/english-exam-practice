<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ExamPrep — ฝึกข้อสอบ TU-GET PBT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+Thai+Looped:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="brand" onclick="goHome()"><span class="logo-mark"><i class="ti ti-checkup-list"></i></span><span class="logo-text">Exam<b>Prep</b><small>ฝึกข้อสอบ</small></span></div>
  <button class="nav-toggle" onclick="toggleNav()" aria-label="เปิด/ปิดเมนู"><i class="ti ti-menu-2"></i></button>
  <nav id="mainNav" class="nav-island">
    <button class="nav-link" data-nav="home" onclick="goHome()"><i class="ti ti-home"></i><span>หน้าหลัก</span></button>
    <button class="nav-link" data-nav="tag" onclick="openTagPractice()"><i class="ti ti-target-arrow"></i><span>ฝึกแยกหัวข้อ</span></button>
    <button class="nav-link" data-nav="vocab" onclick="openVocabList()"><i class="ti ti-cards"></i><span>คลังคำศัพท์</span></button>
    <button class="nav-link" data-nav="bookmark" onclick="openBookmarks()"><i class="ti ti-bookmark"></i><span>บุ๊กมาร์ก</span></button>
    <button class="nav-link" data-nav="stats" onclick="openStats()"><i class="ti ti-chart-line"></i><span>สถิติ</span></button>
    <button class="nav-link" data-nav="wrong" onclick="openWrongBank()"><i class="ti ti-refresh"></i><span>สมุดข้อผิด</span></button>
  </nav>
  <div class="topbar-tools">
    <span class="fs-control" title="ปรับขนาดฟอนต์">
      <button onclick="changeFont(-1)" aria-label="ลดขนาดฟอนต์">A−</button>
      <button onclick="changeFont(1)" aria-label="เพิ่มขนาดฟอนต์">A+</button>
    </span>
    <button id="themeToggle" onclick="toggleTheme()" title="สลับโหมดมืด/สว่าง">🌙</button>
  </div>
</header>

<main id="app"></main>

<footer>
  เว็บฝึกฝนแนวข้อสอบเพื่อการศึกษา — โจทย์ทั้งหมดแต่งขึ้นใหม่ ไม่ใช่ข้อสอบจริง
  และไม่มีส่วนเกี่ยวข้องกับมหาวิทยาลัยธรรมศาสตร์หรือสถาบันภาษา มธ.
</footer>
